<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematik Macerası</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.game-box{
    width:500px;
    max-width:95%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
    margin-bottom:10px;
    font-size:42px;
}

.subtitle{
    color:#ddd;
    margin-bottom:30px;
}

.question{
    font-size:55px;
    margin:30px 0;
    font-weight:bold;
    color:#ffd369;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    font-size:22px;
    text-align:center;
    outline:none;
}

button{
    margin-top:20px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:#ffd369;
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.result{
    margin-top:25px;
    font-size:24px;
    min-height:35px;
}

.score{
    margin-top:25px;
    font-size:22px;
    color:#90ee90;
}

.timer{
    margin-top:15px;
    font-size:20px;
    color:#ffb3b3;
}

.game-over{
    display:none;
}

.game-over h2{
    font-size:45px;
    margin-bottom:20px;
}

.restart{
    background:#4CAF50;
}

</style>
</head>
<body>

<div class="game-box">

    <div id="game">

        <h1>🧠 Matematik Macerası</h1>

        <p class="subtitle">
            Soruları çöz, puan kazan!
        </p>

        <div class="question" id="question">
            5 + 3
        </div>

        <input type="number" id="answer" placeholder="Cevabı yaz">

        <button onclick="checkAnswer()">
            Kontrol Et
        </button>

        <div class="result" id="result"></div>

        <div class="score" id="score">
            Skor: 0
        </div>

        <div class="timer" id="timer">
            Süre: 60
        </div>

    </div>

    <div class="game-over" id="gameOver">

        <h2>🎉 Oyun Bitti</h2>

        <p id="finalScore"></p>

        <button class="restart" onclick="restartGame()">
            Tekrar Oyna
        </button>

    </div>

</div>

<script>

let num1;
let num2;
let operator;
let correctAnswer;

let score = 0;
let timeLeft = 60;

const question = document.getElementById("question");
const answer = document.getElementById("answer");
const result = document.getElementById("result");
const scoreText = document.getElementById("score");
const timerText = document.getElementById("timer");

function generateQuestion(){

    num1 = Math.floor(Math.random() * 20) + 1;
    num2 = Math.floor(Math.random() * 20) + 1;

    const operators = ["+","-","×"];

    operator = operators[Math.floor(Math.random() * operators.length)];

    if(operator === "+"){
        correctAnswer = num1 + num2;
    }

    else if(operator === "-"){
        correctAnswer = num1 - num2;
    }

    else{
        correctAnswer = num1 * num2;
    }

    question.innerText = `${num1} ${operator} ${num2}`;

}

generateQuestion();

function checkAnswer(){

    const userAnswer = Number(answer.value);

    if(userAnswer === correctAnswer){

        result.innerHTML = "✅ Doğru!";
        result.style.color = "#90ee90";

        score += 10;

    }else{

        result.innerHTML = `❌ Yanlış! Doğru cevap: ${correctAnswer}`;
        result.style.color = "#ff7b7b";

    }

    scoreText.innerText = `Skor: ${score}`;

    answer.value = "";

    generateQuestion();

}

answer.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        checkAnswer();
    }

});

const timer = setInterval(()=>{

    timeLeft--;

    timerText.innerText = `Süre: ${timeLeft}`;

    if(timeLeft <= 0){

        clearInterval(timer);

        document.getElementById("game").style.display = "none";

        document.getElementById("gameOver").style.display = "block";

        document.getElementById("finalScore").innerHTML =
        `Toplam Skorun: <b>${score}</b>`;

    }

},1000);

function restartGame(){

    location.reload();

}

</script>

</body>
</html>
